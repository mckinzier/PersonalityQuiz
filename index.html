<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>What Animal Are You?</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div class="container d-flex justify-content-center mt-4">
        <img src="./img/ideas.png" class="img-fluid rounded" alt="Quiz Banner" style="max-width: 600px;">
    </div>

    <h1 class="text-center mt-4">What Animal Are You?</h1>
    
    <!-- Question 1 -->
    <div class="container d-flex justify-content-center" id="question-1">
      <div class="card my-4 p-4 question-block" style="width: 75%;">
        <h4 class="mb-3">1. What’s your favorite environment?</h4>
        <div class="row g-2">
          <div class="col-6">
            <button class="btn btn-outline-primary w-100 answer-btn" 
                    data-question-id="1"
                    data-points-cat="2" data-points-dog="0" data-points-bird="0" data-points-fish="0">
              Cozy home
            </button>
          </div>
          <div class="col-6">
            <button class="btn btn-outline-primary w-100 answer-btn" 
                    data-question-id="1"
                    data-points-cat="0" data-points-dog="2" data-points-bird="0" data-points-fish="0">
              Park / Outdoors
            </button>
          </div>
          <div class="col-6">
            <button class="btn btn-outline-primary w-100 answer-btn" 
                    data-question-id="1"
                    data-points-cat="0" data-points-dog="0" data-points-bird="2" data-points-fish="0">
              Trees / Forest
            </button>
          </div>
          <div class="col-6">
            <button class="btn btn-outline-primary w-100 answer-btn" 
                    data-question-id="1"
                    data-points-cat="0" data-points-dog="0" data-points-bird="0" data-points-fish="2">
              Water / Ocean
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Question 2 -->
    <div class="container d-flex justify-content-center" id="question-2">
      <div class="card my-4 p-4 question-block" style="width: 75%;">
        <h4 class="mb-3">2. How would your friends describe you?</h4>
        <div class="row g-2">
          <div class="col-6">
            <button class="btn btn-outline-primary w-100 answer-btn" 
                    data-question-id="2"
                    data-points-cat="2" data-points-dog="0" data-points-bird="0" data-points-fish="0">
              Independent
            </button>
          </div>
          <div class="col-6">
            <button class="btn btn-outline-primary w-100 answer-btn" 
                    data-question-id="2"
                    data-points-cat="0" data-points-dog="2" data-points-bird="0" data-points-fish="0">
              Loyal
            </button>
          </div>
          <div class="col-6">
            <button class="btn btn-outline-primary w-100 answer-btn" 
                    data-question-id="2"
                    data-points-cat="0" data-points-dog="0" data-points-bird="2" data-points-fish="0">
              Curious
            </button>
          </div>
          <div class="col-6">
            <button class="btn btn-outline-primary w-100 answer-btn" 
                    data-question-id="2"
                    data-points-cat="0" data-points-dog="0" data-points-bird="0" data-points-fish="2">
              Calm
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Question 3 -->
    <div class="container d-flex justify-content-center" id="question-3">
      <div class="card my-4 p-4 question-block" style="width: 75%;">
        <h4 class="mb-3">3. What is your favorite activity?</h4>
        <div class="row g-2">
          <div class="col-6">
            <button class="btn btn-outline-primary w-100 answer-btn" 
                    data-question-id="3"
                    data-points-cat="2" data-points-dog="0" data-points-bird="0" data-points-fish="0">
              Napping / Relaxing
            </button>
          </div>
          <div class="col-6">
            <button class="btn btn-outline-primary w-100 answer-btn" 
                    data-question-id="3"
                    data-points-cat="0" data-points-dog="2" data-points-bird="0" data-points-fish="0">
              Playing / Running
            </button>
          </div>
          <div class="col-6">
            <button class="btn btn-outline-primary w-100 answer-btn" 
                    data-question-id="3"
                    data-points-cat="0" data-points-dog="0" data-points-bird="2" data-points-fish="0">
              Exploring / Observing
            </button>
          </div>
          <div class="col-6">
            <button class="btn btn-outline-primary w-100 answer-btn" 
                    data-question-id="3"
                    data-points-cat="0" data-points-dog="0" data-points-bird="0" data-points-fish="2">
              Swimming / Floating
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="container d-flex justify-content-center">
      <button id="show-result" class="btn btn-success my-4">Show Results</button>
    </div>    

    <div class="container d-flex justify-content-center">
      <div id="result-container" class="card p-4 mb-4" style="width: 75%; display: none;">
        <h3>Your Animal:</h3>
        <p id="result-text"></p>
      </div>
    </div>

    <script src="./js/script.js"></script>
</body>
</html>
